services:
  - type: web
    name: loyalscale-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m uvicorn churn_dashboard.asgi:application --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DJANGO_SETTINGS_MODULE
        value: churn_dashboard.settings
